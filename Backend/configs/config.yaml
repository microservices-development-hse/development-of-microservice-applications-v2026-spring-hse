ProgramSettings:
  resourceTimeout: 5
  analyticsTimeout: 15
  bindAddress: "0.0.0.0"
  bindPort: 8000

DBSettings:
  dbUser: "pguser"
  dbPassword: "pgpassword"
  dbHost: "postgres"
  dbPort: 5432
  dbName: "testdb"

ExternalServices:
  connectorURL: "http://dev_connector:8081"
  kafkaServiceURL: "http://dev_kafka_service:8082"

CorsSettings:
  allowedOrigins: 
    - "http://localhost:4200"
    - "http://localhost:8000"
    - "http://localhost:3000"
  allowedMethods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowedHeaders:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-CSRF-Token"
