# version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: dev_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Database/init_scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: dev_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dev_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka-broker:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dev_kafka_broker
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-service:
    build: ./Kafka
    container_name: dev_kafka_service
    restart: unless-stopped
    volumes:
      - ./logs/kafka:/root/logs
    ports:
      - "8082:8082"
    depends_on:
      kafka-broker:
        condition: service_healthy
      connector:
        condition: service_started

  backend:
    build: ./Backend
    container_name: dev_backend
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=postgres
      - DB_PORT=5432
    ports:
      - "8000:8000"
    volumes:
      - ./logs/backend:/root/logs
    depends_on:
      postgres:
        condition: service_started

  connector:
    build: ./Connector
    container_name: dev_connector
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=postgres
      - DB_PORT=5432
    ports:
      - "8081:8081"
      - "50051:50051"
    volumes:
      - ./logs/connector:/root/logs
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build: ./UI
    container_name: dev_ui
    restart: unless-stopped
    ports:
      - "3000:80"
  
  auth:
    build: ./Auth
    container_name: dev_auth
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      - ./logs/auth:/root/logs
    environment:
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - DB_HOST=postgres
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  dozzle:
    image: amir20/dozzle:latest
    container_name: dev_dozzle
    restart: unless-stopped
    ports:
      - "3003:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_LEVEL=info

volumes:
  pgdata:
